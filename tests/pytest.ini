# pytest.ini
# ----------
# Configuration for the full test suite.
# Place this file in the backend/ directory alongside your tests/ folder.

[pytest]

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output formatting
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header
    -rN

# Markers — define here to avoid "unknown marker" warnings
markers =
    integration: Tests that require real ML models to be loaded (slow, needs ~500MB model)
    slow: Tests that take more than 5 seconds
    requires_redis: Tests that require a real Redis instance
    requires_db: Tests that require a real database connection

# asyncio mode for async tests
asyncio_mode = auto

# Minimum pytest version
minversion = 7.0
